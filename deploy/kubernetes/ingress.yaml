apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prompt2pbi-ingress
  namespace: prompt2pbi
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - app.example.com
      secretName: prompt2pbi-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prompt2pbi-web
                port:
                  number: 80


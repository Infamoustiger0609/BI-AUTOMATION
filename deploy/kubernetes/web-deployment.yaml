apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt2pbi-web
  namespace: prompt2pbi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prompt2pbi-web
  template:
    metadata:
      labels:
        app: prompt2pbi-web
    spec:
      containers:
        - name: web
          image: prompt2pbi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: prompt2pbi-config
            - secretRef:
                name: prompt2pbi-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: shared-storage
              mountPath: /app/data/uploads
              subPath: uploads
            - name: shared-storage
              mountPath: /app/output
              subPath: output
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: prompt2pbi-shared-storage

